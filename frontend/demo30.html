<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        var user={
            name:"John",
            hello:function(){
                return 'Hii '+this.name;
            },
            hello2:()=>{
                return 'Hey '+this.name;
            }
        };
        console.log(user.hello()); // Hii John
        console.log(user.hello2()); // Hey undefined
    </script>

</body>

</html>
