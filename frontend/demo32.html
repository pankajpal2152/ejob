<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script type="text/javascript">
        function Person(name) {
            console.log(name);
        }
        // Callable Approach : Normal function are callable.
        Person("John"); // John
        let p1 = new Person("Diana"); // Diana // Reconstructible

        var Person2 = (name) => {
            console.log("Hello " + name);
        }
        // Callable Arrow functions are callable.
        Person2("Alice"); // Hello Alice
        // We cant create Object of Arrow function is not allowed so we can say 
        // Arrow functions are callable but not constructible at all and also not supported new keyword.
        let p2 = new Person2("Dipanjan");

    </script>
</body>

</html>
