<body>
    <script type="text/javascript">
        var users = [
            { id: 1, name: "John", sal: 23000 },
            { id: 2, name: "Diana", sal: 12000 },
            { id: 3, name: "Russel", sal: 17000 },
            { id: 4, name: "Rahul", sal: 11000 },
            { id: 6, name: "joe", sal: 31000 }
        ];
        // Task : Please select those users whose salary is between 15k-25k
        let myUsers=users.filter((user)=>(user.sal>=15000 && user.sal<=25000));
        console.log(myUsers);
        // Task : Please select those users whose salary not is between 15k-25k
        let myUsers2=users.filter((user)=>!(user.sal>=15000 && user.sal<=25000));
        console.log(myUsers2);
        // find out those users whose name begins with 'j'
        let myUsers3=users.filter((user)=>(user.name.toLowerCase().startsWith('j')));
        console.log(myUsers3);

    </script>
