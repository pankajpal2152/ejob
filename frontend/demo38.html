<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Api Consumption Example</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
        integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct"
        crossorigin="anonymous"></script>
    <script type="text/javascript">
        const apiUrl = "https://jsonplaceholder.typicode.com/users";
        function loadAll() {
            fetch(apiUrl)
                .then((response) => response.json())  //resolve
                .then((users) => {
                    console.log(users);
                    var strContent = `
                <div class="card p-3 m-3 flex">
                    <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Name:</th>
                                <th>UserName:</th>
                                <th>Address:</th>
                                <th>Phone:</th>
                                <th>Website:</th>
                                <th>Company</th>
                                <th>Email</th>
                            </tr>    
                        </thead>
                        <tbody>
                `;
                    users.slice(0, 5).map((user) => {
                        strContent += `
                        <tr>
                        <td>${user?.name}</td>
                        <td>${user?.username}</td>
                        <td>Street : ${user?.address?.street} | Suite : ${user?.address?.suite} | City : ${user?.address?.city} | PinCode:${user?.address?.zipcode}</td>
                        <td><a href="tel:${user?.phone}">${user?.phone}</a></td>
                        <td>${user?.website}</td>
                        <td>Company's Name :${user?.company?.name}</td>
                        <td><a href="mailto:${user?.email}" >${user?.email}</a></td>
                        </tr>
                    `;
                    });
                    strContent += `</table></div></div>`;
                    console.log(strContent);
                    document.getElementById("d1").innerHTML = strContent;

                })
                .catch((error) => {   //reject block
                    console.log(error);
                })
                .finally(() => {
                    console.log("Api Connected");
                })
        }
    </script>
</head>

<body>
    <header class="modal-header">
        <h1>Displaying all Users:</h1>
    </header>
    <div class="container flex">
        <div align="center">
            <button class="btn btn-sm btn-outline-dark" onclick="loadAll()">LoadAll</button>

        </div>
        <div id="d1"></div>
    </div>
</body>

</html>
