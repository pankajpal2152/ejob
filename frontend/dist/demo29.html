<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script type="text/javascript">
        // Traditional JS function.
        function sum(a, b) {
            return a + b;
        }
        let a = sum(12, 23);
        console.log("Sum=" + a); // 35

        // ES-5 Delegates method.
        var sum = function (a, b) {
            return a + b;
        };
        let b = sum(12, 23);
        console.log("Sum=" + b); // 35
        // ES-6 Arrow function shortest way of defining function.
        // var sum=(a,b) =>{
        //     return a + b;
        // };
        var sum = (a, b) => a + b;// Inline Arrow function.
        var mult = (a, b) => a * b;
        var div = (a, b) => a / b;
        let c = sum(12, 23);
        let d = mult(12, 23);
        let e = div(12, 23);
        console.log("Sum=" + c); // 35
        console.log("Mult=" + d); // 276
        console.log("Div=" + e); // 0.5217391304347826
    </script>

</body>

</html>
