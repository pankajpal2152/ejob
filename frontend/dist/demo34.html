<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script type="text/javascript>"
        var numbers=[11,22,33,44,55];
        let firstOdd=numbers.find((x)=>(x%2!=0));
        console.log(firstOdd);
        let firstEven=numbers.find((x)=>(x%2==0));
        console.log(firstEven);
        let allOdds = numbers.filter((x)=>(x%2!=0));
        console.log(...allOdds);
        let allEvens = numbers.filter((x)=>(x%2==0));
        console.log(...allEvens);

        let newArr=numbers.map((x)=>(x*2));
        console.log(...newArr);
    </script>

</body>

</html>
