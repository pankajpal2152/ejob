<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Advanced Employee Dashboard</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #f4f4f4;
        }

        button {
            margin: 5px;
            padding: 8px 12px;
            cursor: pointer;
        }

        input {
            padding: 8px;
            width: 250px;
        }

        /* Badge styles */
        .badge {
            padding: 5px 10px;
            border-radius: 8px;
            color: white;
        }

        .senior {
            background: green;
        }

        .mid {
            background: orange;
        }

        .junior {
            background: blue;
        }

        .fresher {
            background: gray;
        }
    </style>

</head>

<body>

    <h2>🚀 Employee Dashboard</h2>

    <!-- Search -->
    <input type="text" id="search" placeholder="Search by name..." onkeyup="searchUser()">

    <br><br>

    <!-- Buttons -->
    <button onclick="sortAsc()">Sort Salary ↑</button>
    <button onclick="sortDesc()">Sort Salary ↓</button>
    <button onclick="filterExp()">2–5 Years</button>
    <button onclick="resetData()">Reset</button>

    <!-- Table -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Salary</th>
                <th>DOJ</th>
                <th>Experience</th>
                <th>Seniority</th>
            </tr>
        </thead>

        <tbody id="tbody"></tbody>
    </table>

    <script>

        // ================= DATA =================
        const users = [
            { id: 1, name: "John", sal: 23000, doj: '12-12-2022' },
            { id: 2, name: "Diana", sal: 12000, doj: '10-09-2021' },
            { id: 3, name: "Russel", sal: 17000, doj: '12-12-2020' },
            { id: 4, name: "Rahul", sal: 11000, doj: '09-03-2024' },
            { id: 6, name: "joe", sal: 31000, doj: '07-09-2021' }
        ];

        // ================= EXPERIENCE =================
        function getExperience(doj) {
            const today = new Date();
            const join = new Date(doj);

            return Math.floor((today - join) / (1000 * 60 * 60 * 24 * 365));
        }

        // ================= SENIORITY =================
        function getLevel(exp) {
            if (exp >= 5) return { label: "Most Senior", class: "senior" };
            if (exp >= 3) return { label: "Senior", class: "mid" };
            if (exp >= 1) return { label: "Junior", class: "junior" };
            return { label: "Recent", class: "fresher" };
        }

        // ================= PREP DATA =================
        let data = users.map(u => {
            let exp = getExperience(u.doj);
            let level = getLevel(exp);

            return { ...u, experience: exp, level };
        });

        // ================= RENDER =================
        function render(arr) {
            document.getElementById("tbody").innerHTML =
                arr.map(u => `
    <tr>
    <td>${u.id}</td>
    <td>${u.name}</td>
    <td>₹${u.sal}</td>
    <td>${u.doj}</td>
    <td>${u.experience} yrs</td>
    <td><span class="badge ${u.level.class}">
        ${u.level.label}
    </span></td>
    </tr>
    `).join("");
        }

        // ================= ACTIONS =================

        // Sort Asc
        function sortAsc() {
            render([...data].sort((a, b) => a.sal - b.sal));
        }

        // Sort Desc
        function sortDesc() {
            render([...data].sort((a, b) => b.sal - a.sal));
        }

        // Filter 2–5 yrs
        function filterExp() {
            render(data.filter(u => u.experience >= 2 && u.experience <= 5));
        }

        // Search
        function searchUser() {
            let val = document.getElementById("search").value.toLowerCase();

            let filtered = data.filter(u =>
                u.name.toLowerCase().includes(val)
            );

            render(filtered);
        }

        // Reset
        function resetData() {
            document.getElementById("search").value = "";
            render(data);
        }

        // ================= INITIAL LOAD =================
        render(data);

    </script>

</body>

</html>
