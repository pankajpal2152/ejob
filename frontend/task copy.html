<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Employee Table UI</title>
    <style>
        body {
            font-family: Arial;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #f2f2f2;
        }

        button {
            margin: 5px;
            padding: 8px 12px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h2>Employee Management Table</h2>

    <!-- Buttons -->
    <button onclick="sortAsc()">Sort Salary ↑</button>
    <button onclick="sortDesc()">Sort Salary ↓</button>
    <button onclick="filterExp()">Exp 2–5 yrs</button>
    <button onclick="filterNotExp()">NOT 2–5 yrs</button>
    <button onclick="resetData()">Reset</button>

    <!-- Table -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Salary</th>
                <th>DOJ</th>
                <th>Experience</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>

        // ================= DATA =================
        const employees = [
            { empid: 1001, name: 'John', sal: 12000, doj: '02-12-2021' },
            { empid: 1002, name: 'Diana', sal: 21000, doj: '08-18-2020' },
            { empid: 1003, name: 'Dean', sal: 22000, doj: '12-12-2022' },
            { empid: 1004, name: 'Joe', sal: 14000, doj: '09-09-2020' }
        ];

        // ================= ADD EXPERIENCE =================
        const today = new Date();

        let data = employees.map(emp => {
            let exp = today.getFullYear() - new Date(emp.doj).getFullYear();
            return { ...emp, experience: exp };
        });

        // ================= RENDER TABLE =================
        function renderTable(arr) {
            const tbody = document.getElementById("tableBody");

            tbody.innerHTML = arr.map(emp => `
<tr>
    <td>${emp.empid}</td>
    <td>${emp.name}</td>
    <td>₹${emp.sal}</td>
    <td>${emp.doj}</td>
    <td>${emp.experience} yrs</td>
</tr>
`).join("");
        }

        // ================= BUTTON FUNCTIONS =================

        // Sort Ascending
        function sortAsc() {
            let sorted = [...data].sort((a, b) => a.sal - b.sal);
            renderTable(sorted);
        }

        // Sort Descending
        function sortDesc() {
            let sorted = [...data].sort((a, b) => b.sal - a.sal);
            renderTable(sorted);
        }

        // Filter 2–5 years
        function filterExp() {
            let filtered = data.filter(e =>
                e.experience >= 2 && e.experience <= 5
            );
            renderTable(filtered);
        }

        // Filter NOT 2–5 years
        function filterNotExp() {
            let filtered = data.filter(e =>
                !(e.experience >= 2 && e.experience <= 5)
            );
            renderTable(filtered);
        }

        // Reset
        function resetData() {
            renderTable(data);
        }

        // ================= INITIAL LOAD =================
        renderTable(data);

    </script>

</body>

</html>
