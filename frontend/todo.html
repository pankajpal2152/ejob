<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Todos Dashboard</title>

    <!-- Bootstrap 4 CDN -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

</head>

<body>

    <div class="container mt-4">

        <h2 class="text-center mb-4">📋 Todos List</h2>

        <!-- Table -->
        <div class="table-responsive">
            <table class="table table-bordered table-striped text-center">
                <thead class="thead-dark">
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody id="tbody"></tbody>
            </table>
        </div>

    </div>

    <script>

        // ================= API URL =================
        const apiUrl = "https://fakeserver-o4dt.onrender.com/todos";

        // ================= FETCH DATA =================
        async function loadTodos() {
            try {
                let response = await fetch(apiUrl);
                let data = await response.json();

                renderTable(data);

            } catch (err) {
                console.log("Error:", err);
            }
        }

        // ================= RENDER TABLE =================
        function renderTable(todos) {
            document.getElementById("tbody").innerHTML =
                todos.map(todo => `
    <tr>
        <td>${todo.id}</td>
        <td>${todo.title}</td>
        <td>
        <span class="badge ${todo.completed ? 'badge-success' : 'badge-danger'}">
            ${todo.completed ? 'Completed' : 'Pending'}
        </span>
        </td>
    </tr>
    `).join("");
        }

        // ================= INITIAL LOAD =================
        loadTodos();

    </script>

</body>

</html>
